<svg width="860" height="220" viewBox="0 0 860 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&amp;family=DM+Mono:wght@400;500&amp;display=swap');

      .bg { fill: #06070D; }
      .name { font-family: 'Syne', 'Arial Black', sans-serif; font-size: 38px; font-weight: 800; fill: #E8F0FF; }
      .handle { font-family: 'DM Mono', 'Courier New', monospace; font-size: 13px; fill: #1E3A52; }
      .role1 { font-family: 'Syne', 'Arial Black', sans-serif; font-size: 15px; font-weight: 700; fill: #4FC3F7; }
      .role2 { font-family: 'Syne', 'Arial Black', sans-serif; font-size: 15px; font-weight: 700; fill: #7A8A9E; }
      .mono { font-family: 'DM Mono', 'Courier New', monospace; font-size: 12px; fill: #4FC3F7; }
      .mono-dim { font-family: 'DM Mono', 'Courier New', monospace; font-size: 11px; fill: #1E3A52; }
      .stat-val { font-family: 'Syne', 'Arial Black', sans-serif; font-size: 22px; font-weight: 800; fill: #4FC3F7; }
      .stat-key { font-family: 'DM Mono', 'Courier New', monospace; font-size: 10px; fill: #1E3A52; text-transform: uppercase; letter-spacing: 1px; }

      @keyframes breathe { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-3px); } }
      @keyframes blink { 0%,89%,100% { transform: scaleY(1); } 92%,96% { transform: scaleY(0.08); } }
      @keyframes typeL { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-5deg); } }
      @keyframes typeR { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(5deg); } }
      @keyframes glow { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
      @keyframes cur { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
      @keyframes floatA { 0% { transform: translateY(0); opacity: 0; } 10% { opacity: 1; } 85% { opacity: 0.7; } 100% { transform: translateY(-50px); opacity: 0; } }
      @keyframes floatB { 0% { transform: translateY(0); opacity: 0; } 15% { opacity: 1; } 80% { opacity: 0.6; } 100% { transform: translateY(-44px); opacity: 0; } }
      @keyframes floatC { 0% { transform: translateY(0); opacity: 0; } 20% { opacity: 0.9; } 75% { opacity: 0.5; } 100% { transform: translateY(-40px); opacity: 0; } }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }

      .body-g { animation: breathe 3.8s ease-in-out infinite; }
      .eye-l { transform-origin: 748px 91px; animation: blink 5s ease-in-out infinite; }
      .eye-r { transform-origin: 764px 91px; animation: blink 5s ease-in-out infinite; }
      .hand-l { transform-origin: 730px 148px; animation: typeL 0.4s ease-in-out infinite; }
      .hand-r { transform-origin: 778px 148px; animation: typeR 0.4s ease-in-out infinite 0.2s; }
      .screen-glow { animation: glow 3s ease-in-out infinite; }
      .cur { animation: cur 0.9s step-end infinite; }
      .fc-a { animation: floatA 3.4s ease-out infinite 0.3s; }
      .fc-b { animation: floatB 4s ease-out infinite 1.4s; }
      .fc-c { animation: floatC 4.5s ease-out infinite 2.6s; }
      .live-dot { animation: pulse 2.5s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="860" height="220" rx="12" class="bg"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="110" x2="640" y2="110" stroke="#0B1220" stroke-width="1"/>
  <line x1="320" y1="0" x2="320" y2="220" stroke="#0B1220" stroke-width="1"/>

  <!-- ── LEFT: TEXT CONTENT ── -->

  <!-- eyebrow -->
  <text x="32" y="38" class="mono-dim">// profile / readme</text>

  <!-- Name -->
  <text x="32" y="82" class="name">James Clarence</text>
  <text x="32" y="116" class="name" fill="#7A8A9E" font-size="22" font-weight="400" font-family="'Syne','Arial Black',sans-serif">Hena Baysah</text>

  <!-- roles -->
  <text x="32" y="145" class="role1">01 · Data Scientist</text>
  <text x="32" y="163" class="role2">02 · AI Engineer</text>
  <text x="32" y="181" class="role2">03 · Full-Stack Developer</text>

  <!-- divider line -->
  <line x1="32" y1="194" x2="290" y2="194" stroke="#0E1A2E" stroke-width="1"/>

  <!-- handle + live dot -->
  <circle cx="40" cy="207" r="4" fill="#4FC3F7" class="live-dot"/>
  <text x="50" y="211" class="mono-dim">@Statisticsage · building in public</text>

  <!-- ── MIDDLE: STATS ── -->
  <!-- stat boxes -->
  <rect x="336" y="24" width="95" height="72" rx="6" fill="#090C14" stroke="#0E1A2E" stroke-width="1"/>
  <text x="383" y="60" class="stat-val" text-anchor="middle">97K+</text>
  <text x="383" y="82" class="stat-key" text-anchor="middle">records</text>

  <rect x="440" y="24" width="95" height="72" rx="6" fill="#090C14" stroke="#0E1A2E" stroke-width="1"/>
  <text x="487" y="60" class="stat-val" text-anchor="middle">186</text>
  <text x="487" y="82" class="stat-key" text-anchor="middle">sovereignties</text>

  <rect x="544" y="24" width="95" height="72" rx="6" fill="#090C14" stroke="#0E1A2E" stroke-width="1"/>
  <text x="591" y="60" class="stat-val" text-anchor="middle">9</text>
  <text x="591" y="82" class="stat-key" text-anchor="middle">RLS tables</text>

  <!-- terminal / typewriter box -->
  <rect x="336" y="110" width="303" height="40" rx="4" fill="#090C14" stroke="#0E1A2E" stroke-width="1"/>
  <rect x="336" y="110" width="3" height="40" rx="1" fill="#4FC3F7"/>
  <text x="350" y="132" class="mono" font-size="11">building governance intelligence</text>
  <rect x="510" y="122" width="4" height="11" rx="1" fill="#4FC3F7" class="cur"/>

  <!-- stack badges -->
  <rect x="336" y="164" width="60" height="20" rx="3" fill="#090C14" stroke="#0E1A2E" stroke-width="1"/>
  <text x="366" y="178" class="mono-dim" font-size="10" text-anchor="middle">FastAPI</text>

  <rect x="404" y="164" width="60" height="20" rx="3" fill="#090C14" stroke="#0E1A2E" stroke-width="1"/>
  <text x="434" y="178" class="mono-dim" font-size="10" text-anchor="middle">React 18</text>

  <rect x="472" y="164" width="60" height="20" rx="3" fill="#090C14" stroke="#0E1A2E" stroke-width="1"/>
  <text x="502" y="178" class="mono-dim" font-size="10" text-anchor="middle">Python</text>

  <rect x="540" y="164" width="60" height="20" rx="3" fill="#090C14" stroke="#0E1A2E" stroke-width="1"/>
  <text x="570" y="178" class="mono-dim" font-size="10" text-anchor="middle">Supabase</text>

  <rect x="370" y="192" width="60" height="20" rx="3" fill="#090C14" stroke="#0E1A2E" stroke-width="1"/>
  <text x="400" y="206" class="mono-dim" font-size="10" text-anchor="middle">Railway</text>

  <rect x="440" y="192" width="60" height="20" rx="3" fill="#090C14" stroke="#0E1A2E" stroke-width="1"/>
  <text x="470" y="206" class="mono-dim" font-size="10" text-anchor="middle">PostgreSQL</text>

  <rect x="510" y="192" width="60" height="20" rx="3" fill="#090C14" stroke="#0E1A2E" stroke-width="1"/>
  <text x="540" y="206" class="mono-dim" font-size="10" text-anchor="middle">Vercel</text>

  <!-- ── RIGHT: ANIMATED CHARACTER ── -->

  <!-- glow behind laptop -->
  <ellipse cx="752" cy="155" rx="75" ry="38" fill="#4FC3F7" fill-opacity="0.06" class="screen-glow"/>

  <!-- floating code snippets -->
  <g class="fc-a">
    <text x="685" y="62" class="mono" font-size="9" fill="#1A5276">def predict():</text>
  </g>
  <g class="fc-b">
    <text x="790" y="55" class="mono" font-size="9" fill="#0F3A28">RAG pipeline</text>
  </g>
  <g class="fc-c">
    <text x="690" y="42" class="mono" font-size="9" fill="#1A3A52">RLS enabled</text>
  </g>

  <!-- DESK -->
  <rect x="680" y="175" width="158" height="8" rx="3" fill="#0D1A2E"/>
  <rect x="695" y="181" width="16" height="24" rx="2" fill="#0A1020"/>
  <rect x="807" y="181" width="16" height="24" rx="2" fill="#0A1020"/>

  <!-- CHARACTER GROUP -->
  <g class="body-g">
    <!-- hoodie torso -->
    <rect x="718" y="126" width="68" height="52" rx="10" fill="#0F2040"/>
    <!-- pocket -->
    <rect x="738" y="155" width="28" height="18" rx="3" fill="#0A1830"/>
    <!-- drawstrings -->
    <line x1="748" y1="134" x2="745" y2="150" stroke="#1A3A60" stroke-width="1.5"/>
    <line x1="756" y1="134" x2="759" y2="150" stroke="#1A3A60" stroke-width="1.5"/>
    <!-- neck -->
    <rect x="744" y="112" width="16" height="16" rx="4" fill="#C8956C"/>
    <!-- head -->
    <ellipse cx="752" cy="96" rx="24" ry="22" fill="#D4A077"/>
    <!-- hair -->
    <ellipse cx="752" cy="76" rx="25" ry="9" fill="#1A0E05"/>
    <rect x="727" y="76" width="50" height="14" fill="#1A0E05"/>
    <ellipse cx="728" cy="88" rx="7" ry="12" fill="#1A0E05"/>
    <ellipse cx="776" cy="88" rx="7" ry="12" fill="#1A0E05"/>
    <rect x="727" y="72" width="50" height="10" rx="4" fill="#1A0E05"/>
    <!-- ears -->
    <ellipse cx="728" cy="97" rx="4" ry="6" fill="#C8856A"/>
    <ellipse cx="776" cy="97" rx="4" ry="6" fill="#C8856A"/>
    <!-- eyes -->
    <ellipse cx="744" cy="97" rx="4.5" ry="5" fill="#F5E6D0" class="eye-l"/>
    <ellipse cx="760" cy="97" rx="4.5" ry="5" fill="#F5E6D0" class="eye-r"/>
    <circle cx="745" cy="97" r="2.8" fill="#2C1810"/>
    <circle cx="761" cy="97" r="2.8" fill="#2C1810"/>
    <circle cx="746" cy="96" r="0.9" fill="#FFF"/>
    <circle cx="762" cy="96" r="0.9" fill="#FFF"/>
    <!-- eyebrows -->
    <path d="M739 91 Q744 88 749 90" stroke="#3D1F0A" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <path d="M755 90 Q760 88 765 91" stroke="#3D1F0A" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    <!-- nose -->
    <ellipse cx="752" cy="105" rx="2.5" ry="1.8" fill="#B8744A"/>
    <!-- smile -->
    <path d="M746 110 Q752 114 758 110" stroke="#9A5A35" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <!-- arms + hands -->
    <g class="hand-l">
      <rect x="704" y="146" width="20" height="11" rx="5" fill="#0F2040"/>
      <ellipse cx="714" cy="160" rx="9" ry="6" fill="#C8956C"/>
    </g>
    <g class="hand-r">
      <rect x="780" y="146" width="20" height="11" rx="5" fill="#0F2040"/>
      <ellipse cx="790" cy="160" rx="9" ry="6" fill="#C8956C"/>
    </g>
  </g>

  <!-- LAPTOP SCREEN -->
  <rect x="706" y="107" width="92" height="52" rx="4" fill="#0A1525"/>
  <rect x="709" y="110" width="86" height="46" rx="2" fill="#050C1A" class="screen-glow"/>
  <!-- screen code lines -->
  <text x="714" y="122" font-family="monospace" font-size="7" fill="#1A5276">// aegis-atlas</text>
  <text x="714" y="132" font-family="monospace" font-size="7" fill="#4FC3F7">records=97474</text>
  <text x="714" y="142" font-family="monospace" font-size="7" fill="#2E7A5A">✓ deploy OK</text>
  <text x="714" y="151" font-family="monospace" font-size="7" fill="#4FC3F7">FastAPI ready</text>
  <rect x="714" y="153" width="4" height="6" rx="1" fill="#4FC3F7" class="cur"/>
  <!-- hinge -->
  <rect x="706" y="157" width="92" height="3" rx="1" fill="#0D1A2E"/>

  <!-- LAPTOP BASE/KEYBOARD -->
  <rect x="700" y="159" width="104" height="18" rx="3" fill="#0D1A2E"/>
  <rect x="710" y="163" width="6" height="4" rx="1" fill="#0A1525"/>
  <rect x="720" y="163" width="6" height="4" rx="1" fill="#0A1525"/>
  <rect x="730" y="163" width="6" height="4" rx="1" fill="#0A1525"/>
  <rect x="740" y="163" width="6" height="4" rx="1" fill="#0A1525"/>
  <rect x="750" y="163" width="6" height="4" rx="1" fill="#0A1525"/>
  <rect x="760" y="163" width="6" height="4" rx="1" fill="#0A1525"/>
  <rect x="770" y="163" width="6" height="4" rx="1" fill="#0A1525"/>
  <rect x="780" y="163" width="6" height="4" rx="1" fill="#0A1525"/>
  <rect x="714" y="170" width="76" height="3" rx="1" fill="#0A1525"/>
</svg>
